<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Under Maintenance</title>
    <style>
        body { background: #0f0f0f; color: #444; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #222; padding: 40px; text-align: center; border-radius: 5px; }
        h1 { color: #222; font-size: 1.5rem; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="blink">SYSTEM_OFFLINE</h1>
        <p>الوصول غير مصرح به. يتم تسجيل الـ IP الخاص بك.</p>
    </div>
</body>
</html>
